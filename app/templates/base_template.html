<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }}</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap");
            body {
                font-family: "Inter", sans-serif;
                background-color: #1a1a1a;
                scrollbar-width: thin;
                scrollbar-color: #6366f1 #1f2937;
            }
            * {
                scrollbar-width: thin;
                scrollbar-color: #6366f1 #1f2937;
            }
            *::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            *::-webkit-scrollbar-track {
                background: #1f2937;
                border-radius: 9999px;
            }
            *::-webkit-scrollbar-thumb {
                background: linear-gradient(180deg, #818cf8 0%, #6366f1 100%);
                border: 2px solid #1f2937;
                border-radius: 9999px;
            }
            *::-webkit-scrollbar-thumb:hover {
                background: linear-gradient(180deg, #a5b4fc 0%, #7c3aed 100%);
            }
            *::-webkit-scrollbar-corner {
                background: #1f2937;
            }
            .container {
                max-width: 1024px;
            }
            .input-group label {
                margin-bottom: 0.5rem;
                display: block;
                font-weight: 500;
                color: #d1d5db;
            }
            .input-group textarea,
            .input-group input:not([type="file"]),
            .input-group input[type="file"] {
                border-radius: 0.5rem;
                border: 1px solid #4b5563;
                padding: 0.5rem 0.75rem;
                width: 100%;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
                transition: border-color 0.15s ease-in-out;
                background-color: #374151;
                color: #f3f4f6;
            }
            .input-group textarea::placeholder,
            .input-group input::placeholder {
                color: #9ca3af;
            }
            .input-group textarea:focus,
            .input-group input:focus {
                border-color: #60a5fa;
            }
            .table-responsive {
                overflow: auto;
                max-height: 550px;
                scrollbar-gutter: stable both-edges;
            }
            th {
                background-color: #4b5563;
                color: #d1d5db;
            }
            .tab-button.active {
                background-color: #4b5563;
                color: #fff;
            }

            input[type="file"] {
                border: 1px solid #4b5563;
                padding: 0.5rem;
                cursor: pointer;
            }
            input[type="file"]::-webkit-file-upload-button {
                visibility: hidden;
            }
            input[type="file"]::before {
                content: "Selecionar arquivo XML";
                display: inline-block;
                background: #6366f1;
                color: white;
                border-radius: 4px;
                padding: 6px 10px;
                outline: none;
                white-space: nowrap;
                cursor: pointer;
                font-weight: 500;
                font-size: 0.875rem;
                margin-right: 10px;
            }

            .loading-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(26, 26, 26, 0.8);
                backdrop-filter: blur(4px);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 1000;
                color: white;
            }
            .spinner {
                border: 8px solid #374151;
                border-top: 8px solid #6366f1;
                border-radius: 50%;
                width: 60px;
                height: 60px;
                animation: spin 1s linear infinite;
                margin-bottom: 1rem;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body class="p-10 h-screen flex flex-col justify-start">
        <div class="container mx-auto">
            <h1 class="text-3xl font-bold text-indigo-300 mb-6 justify-self-center">
                {{ title }}
            </h1>
            {% block content %}{% endblock %}
        </div>
        <div id="loading-container" class="hidden">
            <div class="loading-overlay">
                <div class="spinner" id="spinner"></div>
                <p id="loading-message" class="text-lg font-semibold">
                    Verificando itens na API...
                </p>
                <p class="text-sm text-gray-300">
                    Isso pode levar algum tempo.
                </p>
                <button id="cancel-button" class="mt-6 bg-red-600 hover:bg-red-500 text-white font-semibold py-2 px-6 rounded-lg transition duration-150 ease-in-out shadow-md">
                    Cancelar
                </button>
            </div>
        </div>
        <script>
    function showTab(mode) {
        document.getElementById("manual-form").classList.add("hidden");
        document.getElementById("xml-form").classList.add("hidden");
        
        document
            .getElementById("btn-manual")
            .classList.remove("active");
        document.getElementById("btn-xml").classList.remove("active");

        document
            .getElementById(mode + "-form")
            .classList.remove("hidden");
        document.getElementById("btn-" + mode).classList.add("active");
    }

    function showManualLoading(loadingContainer, loadingMessage) {
        loadingMessage.textContent = "Pesquisando produtos manualmente...";
        loadingContainer.classList.remove("hidden");
    }

    function hideAlert() {
        document.getElementById("alert-success").classList.add("hidden");
    }

    document.addEventListener("DOMContentLoaded", () => {
        const currentMode = "{{ current_mode or 'manual' }}";
        showTab(
            currentMode.startsWith("xml")
                ? "xml"
                : currentMode.startsWith("xml_verify")
                    ? "xml"
                    : currentMode
        );

        const loadingContainer =
            document.getElementById("loading-container");
        const loadingMessage =
            document.getElementById("loading-message");
        const cancelButton = document.getElementById("cancel-button");

        let activeController = null;
        let activeForm = null;

        const hideLoding = () => {
            loadingContainer.classList.add("hidden");
        };

        cancelButton.addEventListener("click", () => {
            // mandar request para o servidor cancelar a operacao
            fetch("{{ url_for('main.cancel_operation') }}", { method: "POST" })
                .then(() => {
                    cancelButton.disabled = true;
                    cancelButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="animate-spin inline-block h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>Cancelando...';
                    cancelButton.classList.add('opacity-75', 'cursor-not-allowed');
                    document.getElementById("spinner").classList.add("hidden");
                    console.log("Cancel request acknowledged.");
                })
                .catch(err => {
                    console.log("Cancel request sent or already completed:", err);
                    cancelButton.disabled = true;
                    cancelButton.textContent = 'Cancelado';
                });
            //  nao tirar o overylay ainda, esperar o servidor responder
        });

        const manualForm = document.getElementById("manual-form");
        if (manualForm) {
            const manualLoadingHandler = () => {
                activeForm = manualForm;
                activeController = new AbortController();
                showManualLoading(loadingContainer, loadingMessage);
            };

            const textareas = manualForm.querySelectorAll("textarea");
            textareas.forEach(function (textarea) {
                textarea.addEventListener("keydown", function (event) {
                    if (event.key === "Enter" || event.keyCode === 13) {
                        if (!event.shiftKey) {
                            event.preventDefault();
                            
                            manualLoadingHandler();
                            
                            manualForm.submit();
                        }
                    }
                });
            });

            manualForm.addEventListener("submit", manualLoadingHandler);
        }

        const verifyForm = document.getElementById("verify-form");
        if (verifyForm) {
            verifyForm.addEventListener("submit", () => {
                activeForm = verifyForm;
                activeController = new AbortController();
                loadingMessage.textContent =
                    "Verificando itens na API...";
                loadingContainer.classList.remove("hidden");
            });
        }
        const xmlForm = document.getElementById("xml-form");
        if (xmlForm) {
            xmlForm.addEventListener("submit", () => {
                activeForm = xmlForm;
                activeController = new AbortController();
                loadingMessage.textContent =
                    "Processando arquivo XML...";
                loadingContainer.classList.remove("hidden");
            });
        }
    });
</script>
    </body>
</html>
